<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>InfluenceAI - Sign Up</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:wght@400;500;600&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb783",
                        "secondary-container": "#00cbe6",
                        "on-surface-variant": "#c7c4d7",
                        "surface": "#111827",
                        "on-tertiary": "#4f2500",
                        "on-primary-fixed": "#07006c",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb783",
                        "primary-fixed": "#e1e0ff",
                        "on-tertiary-fixed-variant": "#703700",
                        "inverse-on-surface": "#303038",
                        "secondary-fixed-dim": "#2fd9f4",
                        "inverse-primary": "#494bd6",
                        "tertiary-fixed": "#ffdcc5",
                        "on-primary-container": "#0d0096",
                        "secondary-fixed": "#a2eeff",
                        "surface-container-high": "#292932",
                        "tertiary-container": "#d97721",
                        "surface-container-highest": "#34343d",
                        "background": "#0B0F19",
                        "on-primary": "#1000a9",
                        "on-secondary-fixed-variant": "#004e5a",
                        "error-container": "#93000a",
                        "surface-bright": "#393841",
                        "surface-dim": "#13131b",
                        "secondary": "#5de6ff",
                        "on-secondary": "#00363e",
                        "surface-container-lowest": "#0d0d15",
                        "surface-variant": "#34343d",
                        "primary": "#c0c1ff",
                        "outline": "#908fa0",
                        "on-surface": "#e4e1ed",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-background": "#e4e1ed",
                        "surface-tint": "#c0c1ff",
                        "on-secondary-container": "#00515d",
                        "on-secondary-fixed": "#001f25",
                        "on-tertiary-fixed": "#301400",
                        "surface-container-low": "#1b1b23",
                        "accent": "#F472B6",
                        "inverse-surface": "#e4e1ed",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "primary-fixed-dim": "#c0c1ff",
                        "primary-container": "#8083ff",
                        "on-tertiary-container": "#452000",
                        "surface-container": "#1f1f27",
                        "outline-variant": "#464554",
                        "glow-shadow": "0 0 20px rgba(99, 102, 241, 0.3)",
                        "primary-gradient": "linear-gradient(135deg, #6366F1 0%, #22D3EE 100%)"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "space-md": "16px",
                        "margin-page": "40px",
                        "gutter": "24px",
                        "sidebar-width": "240px",
                        "space-xl": "48px",
                        "base": "8px",
                        "space-sm": "8px",
                        "space-xs": "4px",
                        "space-lg": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "display-h1": ["Playfair Display"], // Fallback since Moonrising isn't standard Google font, but kept class mapping
                        "body-lg": ["Newsreader"],
                        "headline-md": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "label-sm": ["Inter"],
                        "body-md": ["Newsreader"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-h1": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Ensuring standard elements inherit custom font fallbacks properly */
        @font-face {
            font-family: 'Moonrising';
            src: local('Playfair Display'); /* Fallback for rendering purposes */
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden antialiased selection:bg-primary/30 selection:text-primary-fixed">
<!-- Subtle Gradient Glow Background -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary/20 blur-[150px] rounded-full mix-blend-screen"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-secondary/10 blur-[150px] rounded-full mix-blend-screen"></div>
</div>
<!-- Auth Canvas -->
<main class="w-full max-w-lg px-gutter relative z-10 flex flex-col items-center">
<!-- Header Text -->
<div class="text-center mb-space-xl w-full">
<h1 class="font-display-h1 text-headline-lg bg-gradient-to-br from-primary to-secondary bg-clip-text text-transparent mb-space-sm" style="font-family: 'Moonrising', 'Playfair Display', serif;">
                Join the Future of Influence
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                Create, automate, and elevate your AI persona.
            </p>
</div>
<!-- Glassmorphism Card -->
<div class="w-full bg-surface/80 backdrop-blur-xl border border-outline-variant/20 rounded-xl p-margin-page shadow-glow-shadow transition-all duration-300">
<form action="#" class="flex flex-col gap-space-lg" method="POST">
<!-- Field: Name -->
<div class="flex flex-col gap-space-xs">
<label class="font-body-md text-body-md text-on-surface-variant" for="name">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-space-md text-outline">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3 pl-[48px] pr-space-md font-label-md text-label-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="name" name="name" placeholder="Alex Mercer" required="" type="text"/>
</div>
</div>
<!-- Field: Email -->
<div class="flex flex-col gap-space-xs">
<label class="font-body-md text-body-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-space-md text-outline">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3 pl-[48px] pr-space-md font-label-md text-label-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="email" name="email" placeholder="alex@influence.ai" required="" type="email"/>
</div>
</div>
<!-- Field: Password -->
<div class="flex flex-col gap-space-xs">
<label class="font-body-md text-body-md text-on-surface-variant" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-space-md text-outline">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3 pl-[48px] pr-space-md font-label-md text-label-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Submit Button -->
<button class="w-full py-3 px-space-md mt-space-sm rounded-lg font-label-md text-label-md text-surface-container-lowest flex items-center justify-center gap-space-sm hover:scale-105 active:scale-95 transition-all duration-300 ease-out shadow-glow-shadow" style="background: linear-gradient(135deg, #6366F1 0%, #22D3EE 100%);" type="submit">
                    Sign Up
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-space-md my-space-lg">
<div class="h-px flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Or</span>
<div class="h-px flex-1 bg-outline-variant/30"></div>
</div>
<!-- Secondary Social Button -->
<button class="w-full py-3 px-space-md border border-outline-variant/50 rounded-lg bg-transparent font-label-md text-label-md text-on-surface flex items-center justify-center gap-space-sm hover:bg-surface-container-high hover:scale-105 active:scale-95 transition-all duration-300 ease-out" type="button">
<!-- Simple generic embedded SVG for Google placeholder to match constraints -->
<svg aria-hidden="true" class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign Up with Google
            </button>
<!-- Footer Text -->
<p class="mt-space-lg text-center font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary hover:text-secondary transition-colors underline underline-offset-4" href="#">Log in</a>
</p>
</div>
</main>
</body></html>
