        @layer utilities {
            .glass-panel {
                @apply bg-surface/60 backdrop-blur-2xl border border-outline-variant/30;

<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-primary/30 selection:text-primary-fixed">
<!-- Ambient AI Glow Background -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-primary-container/20 rounded-full blur-[120px] mix-blend-screen"></div>
<div class="absolute bottom-[10%] -right-[10%] w-[60%] h-[60%] bg-secondary-container/10 rounded-full blur-[150px] mix-blend-screen"></div>
</div>
<!-- Main Auth Container -->
<main class="w-full max-w-[480px] px-gutter z-10 relative">
<!-- Header outside card for editorial feel -->
<div class="text-center mb-space-lg">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-high border border-outline-variant/50 shadow-glow-shadow mb-space-sm">
<span class="material-symbols-outlined text-primary text-[24px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-display-h1 text-display-h1 text-on-surface tracking-tight bg-gradient-to-b from-white to-on-surface-variant bg-clip-text text-transparent pb-2">
                Welcome Back
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2">
                Sign in to manage your AI influencers.
            </p>
</div>
<!-- Glassmorphism Auth Card -->
<div class="glass-panel rounded-xl p-space-xl shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
<form action="#" class="flex flex-col gap-space-lg" method="POST">
<!-- Email Field -->
<div>
<!-- Using body-md (Newsreader) to satisfy the serif/Times New Roman request while staying within design system tokens -->
<label class="block font-body-md text-body-md text-on-surface-variant mb-space-xs" for="email">
                        Email Address
                    </label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/50 rounded-lg pl-12 pr-4 py-3 text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all font-label-md outline-none" id="email" name="email" placeholder="creator@influence.ai" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-baseline mb-space-xs">
<!-- Using body-md (Newsreader) -->
<label class="block font-body-md text-body-md text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="font-label-sm text-label-sm text-primary hover:text-secondary hover:underline transition-colors" href="#">
                            Forgot Password?
                        </a>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest/50 border border-outline-variant/50 rounded-lg pl-12 pr-4 py-3 text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all font-label-md outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full mt-space-sm bg-[linear-gradient(135deg,#6366F1_0%,#22D3EE_100%)] text-white font-label-md text-label-md py-4 rounded-lg shadow-glow-shadow hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex justify-center items-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative mt-space-xl mb-space-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-surface text-on-surface-variant font-label-sm text-label-sm rounded-full border border-outline-variant/30">
                        Or continue with
                    </span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-space-md">
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-outline-variant/50 bg-surface-container-lowest/30 hover:bg-surface-container-high transition-colors font-label-md text-label-md text-on-surface">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-lg border border-outline-variant/50 bg-surface-container-lowest/30 hover:bg-surface-container-high transition-colors font-label-md text-label-md text-on-surface">
<svg class="w-5 h-5 text-on-surface" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
                    GitHub
                </button>
</div>
</div>
<div class="text-center mt-space-lg">
<p class="font-label-md text-label-md text-on-surface-variant">
                Don't have an account? <a class="text-secondary hover:text-primary transition-colors ml-1" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
